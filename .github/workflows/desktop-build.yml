name: Desktop Build

on:
  push:
    branches:
      - linux
      - main
    paths:
      - 'desktop/**'
      - 'core/**'
      - 'core-metadata/**'
      - 'data/**'
      - 'domain/**'
      - 'source-api/**'
      - 'presentation-core/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    branches:
      - linux
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-desktop:
    name: Build Desktop (AppImage / tar.gz / deb)
    runs-on: ubuntu-22.04
    permissions:
      # Job-level grant so the "Publish Pre-release" step can create a GitHub release.
      # Only `contents` is widened; no PRs are created and nothing else is granted.
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Linux packaging tooling
        run: |
          sudo apt-get update
          # jpackage needs these to build .deb packages on Linux.
          sudo apt-get install -y dpkg-dev fakeroot file

      - name: Build AppImage + Deb
        run: ./gradlew :desktop:packageDistributionForCurrentOS

      # Compose's TargetFormat.AppImage produces an app-image *directory* (a
      # self-contained runtime: bin/, lib/, runtime/ + launcher), not a single
      # .AppImage file. Upload that directory tree as the "AppImage" artifact; the
      # portable single-file archive is produced below as the .tar.gz artifact.
      # The dir name is the package name (mihon-desktop) — no version suffix here.
      - name: Collect AppImage (app-image directory)
        uses: actions/upload-artifact@v4
        with:
          name: mihon-desktop-AppImage-${{ github.sha }}
          path: desktop/build/compose/binaries/main/app/mihon-desktop
          if-no-files-found: error

      - name: Collect Deb
        uses: actions/upload-artifact@v4
        with:
          name: mihon-desktop-deb-${{ github.sha }}
          path: desktop/build/compose/binaries/main/deb/*.deb
          if-no-files-found: error

      - name: Build portable tar.gz from app-image
        run: |
          set -euo pipefail
          BUILD_DIR="desktop/build/compose/binaries/main/app"
          # Match the app-image dir whether it's bare (mihon-desktop) or versioned
          # (mihon-desktop-1.0.0), depending on the Compose plugin's configuring.
          IMAGE_DIR="$(find "$BUILD_DIR" -maxdepth 1 -type d -name 'mihon-desktop*' | head -n1)"
          if [ -z "${IMAGE_DIR}" ]; then
            echo "App-image directory not found"; exit 1
          fi
          BASENAME="$(basename "${IMAGE_DIR}")"
          cd "$BUILD_DIR"
          tar -czf "${BASENAME}.tar.gz" "$BASENAME"
          echo "Created ${BUILD_DIR}/${BASENAME}.tar.gz"

      - name: Collect tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: mihon-desktop-portable-targz-${{ github.sha }}
          path: desktop/build/compose/binaries/main/app/*.tar.gz
          if-no-files-found: error

      # Publish the packaged binaries as a GitHub Pre-release (only on the linux/main
      # branches). No PR is opened; `make_latest: false` + `prerelease: true` mark it.
      - name: Publish Pre-release
        if: github.ref == 'refs/heads/linux' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prerelease-${{ github.sha }}
          name: Mihon Desktop (pre-release ${{ github.sha }})
          body: |
            Automated pre-release build from branch `${{ github.ref_name }}` @ ${{ github.sha }}.

            Artifacts:
            - `mihon-desktop-*.deb` — Debian package (amd64).
            - `mihon-desktop-*.tar.gz` — portable app-image bundle (self-contained runtime).

            This UI is an early, work-in-progress preview, built and tested with Java 21. It will be
            greatly improved in the future and is subject to many changes — some of which may match
            the original Mihon design, and some which may not.
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            desktop/build/compose/binaries/main/deb/*.deb
            desktop/build/compose/binaries/main/app/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
